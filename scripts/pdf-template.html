<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>{{TITLE}}</title>
  <style>
    /* Load Inter Variable from local file (identical to what next/font/google serves) */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 100 900;
      font-display: block;
      src: url('{{FONT_URL}}') format('truetype-variations'),
           url('{{FONT_URL}}') format('truetype');
    }

    :root {
      --green: #1e9953;
      --green-light: #f0faf5;
      --green-border: #c8e6d5;
      --dark: #1d1d1f;
      --gray: #6e6e73;
      --gray-light: #f5f5f7;
      --border: #e0e0e0;
    }

    * { box-sizing: border-box; }

    @page {
      size: A4;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-feature-settings: 'cv11', 'ss01', 'ss03';  /* Inter tabular + stylistic sets, matches website */
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
      font-size: 10pt;
      line-height: 1.5;
      font-weight: 400;
    }

    .page {
      padding: 0 18mm 22mm;
    }

    /* ─── Header ─── */
    .header {
      background: var(--dark);
      color: #fff;
      padding: 18mm 18mm 12mm;
      margin: 0 0 10mm;
      border-bottom: 2px solid var(--green);
      position: relative;
    }

    .header .label {
      font-size: 8.5pt;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #9a9a9f;
      margin: 0 0 5mm;
    }

    .header h1 {
      font-size: 28pt;
      font-weight: 700;
      letter-spacing: -0.022em;
      line-height: 1.1;
      margin: 0 0 4mm;
    }

    .header .meta {
      font-size: 9.5pt;
      color: #9a9a9f;
      margin: 0 0 8mm;
      font-weight: 400;
    }

    .pricing {
      display: flex;
      gap: 5mm;
      align-items: center;
    }

    .price-box {
      background: #2c2c30;
      border-radius: 3mm;
      padding: 3mm 5mm;
      min-width: 30mm;
      text-align: center;
    }

    .price-box .price {
      font-size: 13pt;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .price-box .label {
      font-size: 7.5pt;
      color: #9a9a9f;
      font-weight: 400;
      margin-top: 1mm;
    }

    .pricing-note {
      font-size: 8pt;
      color: #707078;
      font-style: italic;
      margin-left: 2mm;
    }

    /* ─── Description ─── */
    .description {
      font-size: 10pt;
      color: #444448;
      line-height: 1.6;
      font-weight: 400;
      margin: 0 0 8mm;
      padding: 0 2mm;
    }

    /* ─── Sections ─── */
    .section {
      margin: 0 0 7mm;
      padding: 0 2mm;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 3mm;
      font-size: 13pt;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--dark);
      margin: 0 0 4mm;
    }

    .section-title::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 18px;
      background: var(--green);
      border-radius: 1px;
    }

    ul.bullets {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    ul.bullets li {
      position: relative;
      padding: 0 0 2mm 6mm;
      font-size: 10pt;
      line-height: 1.5;
      font-weight: 400;
    }

    ul.bullets li::before {
      content: "";
      position: absolute;
      left: 1mm;
      top: 2.2mm;
      width: 2mm;
      height: 2mm;
      background: var(--green);
      border-radius: 50%;
    }

    /* ─── Program modules ─── */
    .module {
      margin: 0 0 5mm;
      break-inside: avoid;
    }

    .module-header {
      background: var(--gray-light);
      border-radius: 2mm;
      padding: 2.5mm 4mm;
      font-size: 10pt;
      font-weight: 600;
      color: var(--dark);
      margin: 0 0 2.5mm;
    }

    .module-items {
      list-style: none;
      padding: 0 0 0 4mm;
      margin: 0;
    }

    .module-items li {
      position: relative;
      padding: 0 0 1.5mm 5mm;
      font-size: 9.5pt;
      line-height: 1.5;
      font-weight: 400;
    }

    .module-items li::before {
      content: "–";
      position: absolute;
      left: 0;
      color: var(--gray);
    }

    /* ─── Prerequisites ─── */
    .prereq {
      font-size: 10pt;
      padding: 0 2mm;
      font-weight: 400;
    }

    /* ─── Footer (running, on every page) ─── */
    .footer {
      position: fixed;
      bottom: 8mm;
      left: 18mm;
      right: 18mm;
      padding-top: 3mm;
      border-top: 0.4pt solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 8pt;
    }

    .footer .brand {
      color: var(--green);
      font-weight: 500;
    }

    .footer .email {
      color: var(--gray);
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="footer">
    <span class="brand">www.pbix.pl</span>
    <span class="email">kontakt@pbix.pl</span>
  </div>

  <header class="header">
    <p class="label">SZKOLENIE</p>
    <h1>{{TITLE}}</h1>
    <p class="meta">{{DURATION}}  ·  {{LANGUAGE}}</p>
    <div class="pricing">
      {{PRICING}}
      <span class="pricing-note">(netto za grupę)</span>
    </div>
  </header>

  <div class="page">
    <p class="description">{{DESCRIPTION}}</p>

    <section class="section">
      <h2 class="section-title">Dla kogo</h2>
      <ul class="bullets">{{TARGET_AUDIENCE}}</ul>
    </section>

    <section class="section">
      <h2 class="section-title">Czego nauczy się zespół</h2>
      <ul class="bullets">{{BENEFITS}}</ul>
    </section>

    <section class="section">
      <h2 class="section-title">Program szkolenia</h2>
      {{PROGRAM}}
    </section>

    <section class="section">
      <h2 class="section-title">Wymagania wstępne</h2>
      <p class="prereq">{{PREREQUISITES}}</p>
    </section>
  </div>
</body>
</html>
