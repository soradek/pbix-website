    <circle cx="56" cy="20" r="16" fill="#fff" opacity="0.7"/>
    <circle cx="92" cy="20" r="16" fill="#fff" opacity="0.5"/>
    <circle cx="128" cy="20" r="16" fill="#fff" opacity="0.3"/>
    <text x="170" y="28" font-family="-apple-system, Segoe UI, sans-serif" font-weight="600" font-size="22" fill="#fff">zespół 4–5 osób</text>
  </g>
  <text x="80" y="560" font-family="-apple-system, Segoe UI, sans-serif" font-weight="500" font-size="20" fill="#a8e6c1" opacity="0.8">pbix.pl · Power BI</text>
