<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Wdrożenie Power BI">
  <defs>
    <linearGradient id="bgpbi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f3a22"/>
      <stop offset="1" stop-color="#1e9953"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgpbi)"/>
  <g opacity="0.07">
    <circle cx="200" cy="100" r="100" fill="#fff"/>
    <circle cx="1050" cy="500" r="160" fill="#fff"/>
  </g>
  <g transform="translate(80,140)">
    <text x="0" y="0" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-weight="700" font-size="76" fill="#fff" letter-spacing="-2">Wdrożenie</text>
    <text x="0" y="80" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-weight="700" font-size="76" fill="#fff" letter-spacing="-2">Power BI</text>
    <text x="0" y="140" font-family="-apple-system, Segoe UI, sans-serif" font-weight="500" font-size="28" fill="#a8e6c1">jak przygotować zespół</text>
  </g>
  <g transform="translate(720,160)">
    <rect x="0" y="0" width="380" height="240" rx="20" fill="#fff" opacity="0.95"/>
    <rect x="20" y="20" width="80" height="50" rx="6" fill="#1e9953" opacity="0.2"/>
    <text x="60" y="52" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="22" fill="#1e9953">KPI</text>
    <rect x="110" y="20" width="80" height="50" rx="6" fill="#1e9953" opacity="0.2"/>
    <text x="150" y="52" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="22" fill="#1e9953">↑12%</text>
    <rect x="200" y="20" width="160" height="50" rx="6" fill="#1e9953"/>
    <text x="280" y="52" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="20" fill="#fff">Sprzedaż</text>
    <polyline points="20,180 60,150 100,160 140,120 180,130 220,90 260,100 300,70 340,80" fill="none" stroke="#1e9953" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="340" cy="80" r="6" fill="#1e9953"/>
    <line x1="20" y1="220" x2="360" y2="220" stroke="#1e9953" stroke-width="1.5" opacity="0.3"/>
  </g>
  <g transform="translate(720,440)">
